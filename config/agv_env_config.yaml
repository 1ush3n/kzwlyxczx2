# AGV Compliance Environment Configuration

physics:
  dt: 0.02                    # 仿真控制步长 (秒), 对应 50Hz 控制频率
  Kw: 10000.0                 # 机翼等效刚度 (N/m)
  Cw: 500.0                   # 机翼等效结构阻尼 (N·s/m)
  L: 2.0                      # 主从车理想几何跨距 (m)
  history_buffer_size: 500    # 网络延迟缓冲区的最大容量 (防断网)

impedance:
  M_base: 50.0                # 虚拟质量基准值 (kg)
  B_base: 500.0               # 虚拟阻尼基准值 (N·s/m)
  K_base: 3000.0              # 虚拟刚度基准值 (增加以测试 RL 柔顺减振能力)
  M_delta_max: 30.0           # 动作空间调整 M 的最大幅度
  B_delta_max: 300.0          # 动作空间调整 B 的最大幅度
  K_delta_max: 2500.0         # 动作空间调整 K 的最大幅度 (增加范围以覆盖减振)

rl:
  frame_stack_k: 4            # 堆叠的历史状态帧数 (对应 O_t)
  F_max: 5000.0               # 归一化最大受力 (N)
  e_max: 0.5                  # 归一化最大误差 (m)
  alpha: 3.0                  # 奖励函数: 归一化应力平方惩罚权重 (加权以换取更低的应力)
  beta: 1.0                   # 奖励函数: 归一化误差平方惩罚权重
  omega_3: 0.8                # 奖励函数: 动作抖动(平滑)惩罚权重

comms:
  protocol: "mock"            # 可选: "mock" 或 "modbus_tcp"
  base_rtt: 0.05              # 基础网络延迟 (秒)
  rtt_noise_std: 0.01         # 延迟抖动标准差 (秒)
